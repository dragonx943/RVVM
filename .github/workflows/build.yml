name: Build

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    name: Build on ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    env:
      BUILDDIR: build
      USE_ANALYZER: 1

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
            make: make CFLAGS="-Werror"
            runner: ubuntu-latest
            apt-pkgs: libx11-dev libxext-dev libwayland-dev libxkbcommon-dev
            test: yes

            # RVVM FPU tests fail with 8087, use SSE2
          - os: linux
            arch: i386
            make: make CFLAGS="-Werror -m32 -mfpmath=sse -msse2"
            runner: ubuntu-latest
            apt-pkgs: gcc-multilib libx11-dev libxext-dev libwayland-dev libxkbcommon-dev
            test: yes

          - os: linux
            arch: arm64
            make: make CFLAGS="-Werror"
            runner: ubuntu-24.04-arm
            apt-pkgs: libx11-dev libxext-dev libwayland-dev libxkbcommon-dev
            test: yes

          - os: linux
            arch: riscv64
            make: make CC=riscv64-linux-gnu-gcc CFLAGS="-Werror"
            runner: ubuntu-latest
            apt-pkgs: gcc-riscv64-linux-gnu libc6-dev-riscv64-cross libx11-dev libxext-dev libwayland-dev libxkbcommon-dev

          - os: windows
            arch: x86_64
            make: make CC=x86_64-w64-mingw32-gcc CFLAGS="-Werror"
            runner: ubuntu-latest

          - os: windows
            arch: arm64
            make: make CC=aarch64-w64-mingw32-gcc CFLAGS="-Werror"
            runner: ubuntu-latest

          - os: windows
            arch: i386
            make: make CC=i686-w64-mingw32-gcc CFLAGS="-Werror -march=i386"
            runner: ubuntu-latest

          - os: macos
            arch: x86_64
            make: make CFLAGS="-Werror -target x86_64-apple-macos10.12 -ISDL2/include"
            runner: macos-latest
            test: yes

          - os: macos
            arch: arm64
            make: make CFLAGS="-Werror -target arm64-apple-macos11 -ISDL2/include"
            runner: macos-latest
            test: yes

          - os: freebsd
            arch: x86_64
            make: make USE_GUI=0 CC=clang CFLAGS="-Werror -target x86_64-unknown-freebsd14.3 --sysroot=freebsd-sysroot" LD="lld" LDFLAGS="--sysroot=freebsd-sysroot"
            runner: ubuntu-latest
            apt-pkgs: clang lld wget xz-utils
            freebsd_sysroot_url: https://download.freebsd.org/ftp/releases/amd64/amd64/14.3-RELEASE/base.txz

    steps:
    - name: Checkout
      uses: actions/checkout@v4.1.1

    - name: Install Dependencies
      if: matrix.apt-pkgs
      run: |
        sudo DEBIAN_FRONTEND=noninteractive apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -yq --no-install-recommends ${{ matrix.apt-pkgs }}

    - name: Download LLVM-MinGW Toolchain
      if: matrix.os == 'windows' && matrix.runner == 'ubuntu-latest'
      run: |
        LLVM_MINGW_VERSION="20250613"
        LLVM_MINGW_ARCHIVE="llvm-mingw-${LLVM_MINGW_VERSION}-msvcrt-ubuntu-22.04-x86_64.tar.xz "
        LLVM_MINGW_URL="https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_VERSION}/${LLVM_MINGW_ARCHIVE}"

        echo "Downloading LLVM-MinGW from: ${LLVM_MINGW_URL}"
        wget -q ${LLVM_MINGW_URL} -O ${LLVM_MINGW_ARCHIVE}

        echo "Extracting LLVM-MinGW..."
        mkdir -p llvm-mingw
        tar -xf ${LLVM_MINGW_ARCHIVE} -C llvm-mingw --strip-components=1

        echo "LLVM-MinGW extracted to: $(pwd)/llvm-mingw"
        echo "${{ github.workspace }}/llvm-mingw/bin" >> $GITHUB_PATH

    - name: Download SDL2 headers
      if: matrix.os == 'macos'
      run: |
        SDL2_VERSION="2.30.12"
        SDL2_NAME="SDL2-${SDL2_VERSION}"
        SDL2_URL="https://github.com/libsdl-org/SDL/releases/download/release-${SDL2_VERSION}/${SDL2_NAME}.tar.gz"
        wget ${SDL2_URL} -O - | tar -xzf -
        mv ${SDL2_NAME} SDL2

    - name: Download FreeBSD sysroot
      if: matrix.os == 'freebsd'
      run: |
        mkdir freebsd-sysroot
        wget -qO- ${{ matrix.freebsd_sysroot_url }} | tar -Jxf - -C freebsd-sysroot

    - name: Build
      run: ${{ matrix.make }}

    - name: Run tests
      if: matrix.test
      timeout-minutes: 10
      run: ${{ matrix.make }} test

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4.3.1
      with:
        compression-level: 9
        retention-days: 5
        name: rvvm_${{ matrix.os }}_${{ matrix.arch }}
        path: |
          build/*
          !build/*/
